<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="ANSI">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crossword Puzzle Interface</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #222;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px;
            margin: 0;
            user-select: none;
        }

        h1 { margin: 2px 0 5px 0; font-size: 18px; text-align: center; }

        /* Volume Selection Panel Styles */
        #volume-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(17, 17, 17, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .volume-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #555;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 360px;
            width: 90%;
        }

        .volume-card h2 {
            margin-top: 0;
            color: #fff;
            font-size: 18px;
        }

        .volume-card p {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 15px;
        }

        .selector-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            padding: 2px;
        }

        .num-btn {
            padding: 10px 0;
            background: #3a3a3a;
            border: 1px solid #555;
            color: #fff;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .num-btn:hover:not(:disabled) {
            background: #ff9100;
            border-color: #ff9100;
        }

        .num-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        #main-layout {
            display: none; /* Controlled by selector */
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }

        #game-container {
            position: relative;
            background-color: #111;
            padding: 4px;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 100%;
            box-sizing: border-box;
        }

        #crossword-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(9, 1fr);
            gap: 1px;
            background-color: #444;
            border: 2px solid #444;
            width: 100%;
            aspect-ratio: 1 / 1;
            box-sizing: border-box;
        }

        .grid-cell {
            position: relative;
            background-color: #fff;
            box-sizing: border-box;
        }

        .grid-cell.black-square {
            background-color: #111;
        }

        .cell-num {
            position: absolute;
            top: 1px;
            left: 2px;
            font-size: 8px;
            font-weight: bold;
            color: #333;
            line-height: 1;
            pointer-events: none;
            z-index: 2;
        }

        .cell-input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #000;
            text-transform: uppercase;
            outline: none;
            padding: 4px 0 0 0;
            box-sizing: border-box;
            caret-color: transparent; 
            transition: background-color 0.15s ease;
            position: relative;
            z-index: 1;
        }

        .cell-input.highlighted {
            background-color: #bababa !important;
        }

        @media (max-width: 450px) {
            .cell-input { font-size: 14px; padding: 2px 0 0 0; }
            .cell-num { font-size: 7px; top: 1px; left: 1px; }
        }

        .cell-input:focus {
            background-color: #ff9100 !important;
            color: #fff !important;
        }

        .slashed-incorrect {
            background: linear-gradient(to top right, transparent 46%, #c62828 46%, #c62828 54%, transparent 54%) !important;
            color: #c62828 !important;
        }

        #clue-display {
            background: #2a2a2a;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 6px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .clue-sect { margin-bottom: 0; }
        
        .clue-text { 
            font-size: 13px; 
            margin: 0; 
            line-height: 1.2; 
            padding: 3px 5px;
            border-radius: 3px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }

        .clue-text.active-clue {
            background-color: #ffeb3b !important;
            color: #000 !important;
            font-weight: bold;
        }

        #action-bar {
            margin-top: 4px;
            width: 100%;
            display: flex;
            gap: 6px;
            justify-content: center;
            box-sizing: border-box;
        }

        .action-btn {
            flex: 1;
            height: 26px;
            line-height: 26px;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: background 0.2s;
            padding: 0;
            text-align: center;
        }

        #check-btn { background: #f57c00; }
        #check-btn:active { background: #ef6c00; }
        #check-btn.active-state { background: #7b1fa2; }

        #reveal-btn { background: #00897b; }
        #reveal-btn:active { background: #00695c; }
        
        #reset-btn { background: #c62828; }
        #reset-btn:active { background: #b71c1c; }

        #new-puzzle-btn { background: #1e88e5; }
        #new-puzzle-btn:active { background: #1565c0; }

        .status-banner {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.6);
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        #win-banner {
            background: rgba(46, 125, 50, 0.95);
            border: 3px solid #81c784;
        }

        #try-again-banner {
            background: rgba(198, 40, 40, 0.95);
            border: 3px solid #e57373;
            font-size: 18px;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        #virtual-keyboard {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            max-width: 450px;
            background: #151515;
            padding: 6px;
            border-radius: 6px;
            box-sizing: border-box;
            margin-top: 2px;
        }

        @media (pointer: fine) {
            #virtual-keyboard {
                display: none;
            }
        }

        .kbd-row {
            display: flex;
            justify-content: center;
            gap: 3px;
            width: 100%;
        }

        .key {
            flex: 1;
            height: 36px;
            background: #3a3a3a;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
        }

        .key:active { background: #555; }
        .key.wide { flex: 1.5; background: #c62828; }
        .key.nav { background: #1e88e5; }
    </style>
</head>

    <h1 id="puzzle-headline">MiniMax Crossword</h1>

                <button class="key nav" data-key="ArrowUp">&#9650;</button>
            </div>
            <div class="kbd-row">
                <button class="key nav" data-key="ArrowLeft">&#9664;</button><button class="key nav" data-key="ArrowDown">&#9660;</button><button class="key nav" data-key="ArrowRight">&#9654;</button>
            </div>
        </div>

        <div id="action-bar">
            <button id="new-puzzle-btn" class="action-btn">New Puzzle</button>
            <button id="check-btn" class="action-btn">Check Puzzle</button>
            <button id="reveal-btn" class="action-btn">Reveal Puzzle</button>
            <button id="reset-btn" class="action-btn">Reset Puzzle</button>
        </div>
    </div>

        // --- GLOBAL ENGINE TARGET STATES ---
        let solutionGrid = [];
        let acrossClues = {};
        let downClues = {};
        let gridInputs = {};
        let cellMap = {}; 
        let activeInput = null;
        let isChecking = false;
        let currentDirection = "ACROSS";
        let currentActivePuzzleId = null;

        const gridContainer = document.getElementById("crossword-grid");
        const overlay = document.getElementById('volume-overlay');
        const mainLayout = document.getElementById('main-layout');
        const headlineElement = document.getElementById('puzzle-headline');

        // --- DYNAMIC OVERLAY GENERATOR ---
        function initVolumeLauncher() {
            const pickerContainer = document.getElementById('picker-container');
            pickerContainer.innerHTML = '';
            
            for (let i = 1; i <= 31; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.innerText = i;
                
                const matchedPuzzle = myPuzzleLibrary.find(p => p.id === i);
                if (!matchedPuzzle) {
                    btn.disabled = true;
                } else {
                    btn.addEventListener('click', () => loadTargetLibraryPuzzle(matchedPuzzle));
                }
                pickerContainer.appendChild(btn);
            }
        }

        // --- DATA INGESTION ENGINE ---
        function loadTargetLibraryPuzzle(puzzleObj) {
            currentActivePuzzleId = puzzleObj.id;
            headlineElement.textContent = `MiniMax Crosswords Vol.1 Puzzle ${puzzleObj.id}`;

            // Clear previous grid elements completely
            gridContainer.innerHTML = '';
            solutionGrid = [];
            acrossClues = {};
            downClues = {};
            gridInputs = {};
            cellMap = {};
            activeInput = null;
            if (isChecking) clearCheckSlashes();

            const rawPuzzleData = puzzleObj.data.trim();
            const lines = rawPuzzleData.split('\n').map(l => l.replace('\r', '')).filter(l => l.trim().length > 0);
            let parsingMode = "GRID";

            lines.forEach((line) => {
                if (line.startsWith("@1=ACROSS")) { parsingMode = "ACROSS"; return; }
                if (line.startsWith("@1=DOWN")) { parsingMode = "DOWN"; return; }

                if (parsingMode === "GRID" && solutionGrid.length < 9) {
                    let formattedGridLine = line;
                    while (formattedGridLine.length < 9) formattedGridLine += ' ';
                    solutionGrid.push(formattedGridLine);
                } else {
                    const clueMatch = line.match(/^(\d+)\.\s*([^<]+)/);
                    if (clueMatch) {
                        const num = parseInt(clueMatch[1]);
                        const body = clueMatch[2].trim();
                        if (parsingMode === "ACROSS") acrossClues[num] = body;
                        if (parsingMode === "DOWN") downClues[num] = body;
                    }
                }
            });

            // Rebuild layout grid
            buildGridElements();

            // Handle panel display shifts
            overlay.style.display = 'none';
            mainLayout.style.display = 'flex';

            // Seed session states
            loadPuzzleProgress();
            if (!activeInput) initializeCursorToFirstEmptySquare();
        }

        // --- GRID RUNTIME GENERATION ---
        function buildGridElements() {
            let currentNumber = 1;
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    
                    const isBlack = (solutionGrid[r][c] === ' ' || solutionGrid[r][c] === '*');
                    const cellDiv = document.createElement("div");
                    
                    if (isBlack) {
                        cellDiv.className = "grid-cell black-square";
                    } else {
                        cellDiv.className = "grid-cell";
                        
                        const needsAcrossNum = (c === 0 || solutionGrid[r][c-1] === ' ' || solutionGrid[r][c-1] === '*') && (c < 8 && (solutionGrid[r][c+1] !== ' ' || solutionGrid[r][c+1] !== '*'));
                        const needsDownNum = (r === 0 || solutionGrid[r-1][c] === ' ' || solutionGrid[r-1][c] === '*') && (r < 8 && (solutionGrid[r+1][c] !== ' ' || solutionGrid[r+1][c] !== '*'));
                        
                        let assignedNum = null;
                        if (needsAcrossNum || needsDownNum) {
                            assignedNum = currentNumber++;
                            const numSpan = document.createElement("span");
                            numSpan.className = "cell-num";
                            numSpan.textContent = assignedNum;
                            cellDiv.appendChild(numSpan);
                        }

                        const input = document.createElement("input");
                        input.type = "text"; input.maxLength = 1; input.className = "cell-input";
                        input.setAttribute("readonly", "true");
                        input.dataset.row = r; input.dataset.col = c;

                        const coordKey = `${r}-${c}`;
                        gridInputs[coordKey] = input;
                        cellMap[coordKey] = { r, c, num: assignedNum, acrossId: null, downId: null };

                        const selectHandler = (e) => {
                            e.preventDefault();
                            
                            if (activeInput === input) {
                                currentDirection = (currentDirection === "ACROSS") ? "DOWN" : "ACROSS";
                            }
                            
                            input.focus();
                            activeInput = input;
                            updateClueDisplays(r, c);
                            highlightActiveWord(r, c);
                        };
                        input.addEventListener("mousedown", selectHandler);
                        input.addEventListener("touchstart", selectHandler);

                        cellDiv.appendChild(input);
                    }
                    gridContainer.appendChild(cellDiv);
                }
            }

            // Pre-compute matrix link layouts
            for (let r = 0; r < 9; r++) {
                let activeAcrossNum = null;
                for (let c = 0; c < 9; c++) {
                    const meta = cellMap[`${r}-${c}`];
                    if (!meta) { activeAcrossNum = null; continue; }
                    if (meta.num && (c === 0 || solutionGrid[r][c-1] === ' ' || solutionGrid[r][c-1] === '*')) activeAcrossNum = meta.num;
                    meta.acrossId = activeAcrossNum;
                }
            }
            for (let c = 0; c < 9; c++) {
                let activeDownNum = null;
                for (let r = 0; r < 9; r++) {
                    const meta = cellMap[`${r}-${c}`];
                    if (!meta) { activeDownNum = null; continue; }
                    if (meta.num && (r === 0 || solutionGrid[r-1][c] === ' ' || solutionGrid[r-1][c] === '*')) activeDownNum = meta.num;
                    meta.downId = activeDownNum;
                }
            }
        }

        // --- RUNTIME INTERACTIVE FUNCTIONAL LOGIC ---
        function updateClueDisplays(r, c) {
            const meta = cellMap[`${r}-${c}`];
            const acrossDisplay = document.getElementById("across-clue-container");
            const downDisplay = document.getElementById("down-clue-container");

            if (!meta) return;

            if (meta.acrossId && acrossClues[meta.acrossId]) {
                const isClueActive = (currentDirection === "ACROSS");
                acrossDisplay.innerHTML = `<p class="clue-text ${isClueActive ? 'active-clue' : ''}" data-clue-id="${meta.acrossId}" data-type="ACROSS"><strong>${meta.acrossId} Across:</strong> ${acrossClues[meta.acrossId]}</p>`;
                
                const element = acrossDisplay.querySelector('.clue-text');
                const triggerClueSelection = (e) => {
                    e.preventDefault();
                    currentDirection = "ACROSS";
                    if (activeInput) {
                        activeInput.focus();
                        updateClueDisplays(r, c);
                        highlightActiveWord(r, c);
                    }
                };
                element.addEventListener("mousedown", triggerClueSelection);
                element.addEventListener("touchstart", triggerClueSelection);
            } else {
                acrossDisplay.innerHTML = `<p class="clue-text" style="color:#aaa; cursor: default;">No active across clue.</p>`;
            }

            if (meta.downId && downClues[meta.downId]) {
                const isClueActive = (currentDirection === "DOWN");
                downDisplay.innerHTML = `<p class="clue-text ${isClueActive ? 'active-clue' : ''}" data-clue-id="${meta.downId}" data-type="DOWN"><strong>${meta.downId} Down:</strong> ${downClues[meta.downId]}</p>`;
                
                const element = downDisplay.querySelector('.clue-text');
                const triggerClueSelection = (e) => {
                    e.preventDefault();
                    currentDirection = "DOWN";
                    if (activeInput) {
                        activeInput.focus();
                        updateClueDisplays(r, c);
                        highlightActiveWord(r, c);
                    }
                };
                element.addEventListener("mousedown", triggerClueSelection);
                element.addEventListener("touchstart", triggerClueSelection);
            } else {
                downDisplay.innerHTML = `<p class="clue-text" style="color:#aaa; cursor: default;">No active down clue.</p>`;
            }
        }

        function highlightActiveWord(activeR, activeC) {
            for (let coordKey in gridInputs) {
                gridInputs[coordKey].classList.remove("highlighted");
            }

            if (currentDirection === "ACROSS") {
                let startC = activeC;
                while (startC > 0 && solutionGrid[activeR][startC - 1] !== ' ') {
                    startC--;
                }
                let endC = activeC;
                while (endC < 9 && solutionGrid[activeR][endC] !== ' ') {
                    const key = `${activeR}-${endC}`;
                    if (gridInputs[key] && gridInputs[key] !== activeInput) {
                        gridInputs[key].classList.add("highlighted");
                    }
                    endC++;
                }
            } else {
                let startR = activeR;
                while (startR > 0 && solutionGrid[startR - 1][activeC] !== ' ') {
                    startR--;
                }
                let endR = activeR;
                while (endR < 9 && solutionGrid[endR][activeC] !== ' ') {
                    const key = `${endR}-${activeC}`;
                    if (gridInputs[key] && gridInputs[key] !== activeInput) {
                        gridInputs[key].classList.add("highlighted");
                    }
                    endR++;
                }
            }
        }

        function savePuzzleProgress() {
            const state = {};
            for (let coordKey in gridInputs) {
                if (gridInputs[coordKey].value !== "") {
                    state[coordKey] = gridInputs[coordKey].value;
                }
            }
            // Unique storage keys assigned per dynamic layout index matching library arrays
            localStorage.setItem(`crossword_save_game_${currentActivePuzzleId}`, JSON.stringify(state));
        }

        function loadPuzzleProgress() {
            const rawSave = localStorage.getItem(`crossword_save_game_${currentActivePuzzleId}`);
            if (!rawSave) return;
            try {
                const savedState = JSON.parse(rawSave);
                for (let coordKey in savedState) {
                    if (gridInputs[coordKey]) {
                        gridInputs[coordKey].value = savedState[coordKey].toUpperCase();
                    }
                }
                checkPuzzleCompletion();
            } catch (e) {
                console.error("Error loading puzzle state:", e);
            }
        }

        function handleGridInput(value) {
            if (!activeInput) return;

            document.getElementById("try-again-banner").style.display = "none";
            if (isChecking) clearCheckSlashes(); 

            if (value === "DEL") {
                activeInput.value = "";
                savePuzzleProgress();
                moveCursorFlow(-1);
            } else if (value === "ArrowRight") {
                moveCursorManual(0, 1);
            } else if (value === "ArrowLeft") {
                moveCursorManual(0, -1);
            } else if (value === "ArrowUp") {
                moveCursorManual(-1, 0);
            } else if (value === "ArrowDown") {
                moveCursorManual(1, 0);
            } else {
                activeInput.value = value.toUpperCase();
                savePuzzleProgress();
                moveCursorFlow(1);
            }

            checkPuzzleCompletion();
        }

        function moveCursorFlow(dir) {
            let r = parseInt(activeInput.dataset.row);
            let c = parseInt(activeInput.dataset.col);
            
            let attempts = 0;
            while (attempts < 9) {
                if (currentDirection === "ACROSS") {
                    c += dir;
                } else {
                    r += dir;
                }

                if (c < 0 || c > 8 || r < 0 || r > 8) break;

                const nextKey = `${r}-${c}`;
                if (gridInputs[nextKey]) {
                    gridInputs[nextKey].focus();
                    activeInput = gridInputs[nextKey];
                    updateClueDisplays(r, c);
                    highlightActiveWord(r, c);
                    break;
                }
                attempts++;
            }
        }

        function moveCursorManual(dr, dc) {
            let r = parseInt(activeInput.dataset.row);
            let c = parseInt(activeInput.dataset.col);
            
            while (true) {
                r += dr;
                c += dc;
                if (r < 0 || r > 8 || c < 0 || c > 8) break;
                
                const nextKey = `${r}-${c}`;
                if (gridInputs[nextKey]) {
                    gridInputs[nextKey].focus();
                    activeInput = gridInputs[nextKey];
                    updateClueDisplays(r, c);
                    highlightActiveWord(r, c);
                    break;
                }
            }
        }

        function checkPuzzleCompletion() {
            let complete = true;
            let totalSquaresFilled = true;

            for (let coordKey in gridInputs) {
                const inputField = gridInputs[coordKey];
                const r = parseInt(inputField.dataset.row);
                const c = parseInt(inputField.dataset.col); 
                
                const expectedChar = solutionGrid[r][c];
                const val = inputField.value.trim().toUpperCase();

                if (val === "") {
                    totalSquaresFilled = false;
                }
                if (val !== expectedChar.toUpperCase()) {
                    complete = false;
                }
            }

            const winBanner = document.getElementById("win-banner");
            const tryAgainBanner = document.getElementById("try-again-banner");

            if (complete) {
                winBanner.style.display = "block";
                tryAgainBanner.style.display = "none";
            } else if (totalSquaresFilled) {
                tryAgainBanner.style.display = "block";
                winBanner.style.display = "none";
            } else {
                winBanner.style.display = "none";
                tryAgainBanner.style.display = "none";
            }
        }

        function initializeCursorToFirstEmptySquare() {
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const coordKey = `${r}-${c}`;
                    const targetField = gridInputs[coordKey];
                    
                    if (targetField && targetField.value.trim() === "") {
                        targetField.focus();
                        activeInput = targetField;
                        currentDirection = "ACROSS";
                        updateClueDisplays(r, c);
                        highlightActiveWord(r, c);
                        return;
                    }
                }
            }
            
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const coordKey = `${r}-${c}`;
                    const targetField = gridInputs[coordKey];
                    if (targetField) {
                        targetField.focus();
                        activeInput = targetField;
                        currentDirection = "ACROSS";
                        updateClueDisplays(r, c);
                        highlightActiveWord(r, c);
                        return;
                    }
                }
            }
        }

        });

            if (isChecking) clearCheckSlashes();
            document.getElementById("try-again-banner").style.display = "none";
            
            for (let coordKey in gridInputs) {
                const inputField = gridInputs[coordKey];
                const r = parseInt(inputField.dataset.row);
                const c = parseInt(inputField.dataset.col); 
                inputField.value = solutionGrid[r][c].toUpperCase();
            }
            savePuzzleProgress();
            checkPuzzleCompletion();
        });

            if (isChecking) clearCheckSlashes();

            document.getElementById("win-banner").style.display = "none";
            document.getElementById("try-again-banner").style.display = "none";
            
            if (activeInput) { activeInput.blur(); activeInput = null; }
            for (let coordKey in gridInputs) { gridInputs[coordKey].classList.remove("highlighted"); }

            document.getElementById("across-clue-container").innerHTML = `<p class="clue-text" style="color:#aaa; cursor: default;">Select a cell to view across clues.</p>`;
            document.getElementById("down-clue-container").innerHTML = `<p class="clue-text" style="color:#aaa; cursor: default;">Select a cell to view down clues.</p>`;
            
            initializeCursorToFirstEmptySquare();

        function applyCheckSlashes() {
            isChecking = true;
            checkBtn.textContent = "Resume Solving";
            checkBtn.classList.add("active-state");

            for (let coordKey in gridInputs) {
                const inputField = gridInputs[coordKey];
                const r = parseInt(inputField.dataset.row);
                const c = parseInt(inputField.dataset.col); 
                
                const expectedChar = solutionGrid[r][c];
                const enteredChar = inputField.value.trim().toUpperCase();

                if (enteredChar !== "" && enteredChar !== expectedChar) {
                    inputField.classList.add("slashed-incorrect");
                }
            }
        }

        function clearCheckSlashes() {
            isChecking = false;
            checkBtn.textContent = "Check Puzzle";

        }

        // --- GLOBAL HARDWARE KEYBOARD EVENT HANDLERS ---
        document.querySelectorAll("#virtual-keyboard .key").forEach(keyBtn => {
            keyBtn.addEventListener("touchstart", (e) => {
                e.preventDefault();
                const keyVal = keyBtn.getAttribute("data-key");
                handleGridInput(keyVal);
            });
            keyBtn.addEventListener("mousedown", (e) => {
                e.preventDefault();
                const keyVal = keyBtn.getAttribute("data-key");
                handleGridInput(keyVal);
            });
        });

        window.addEventListener("keydown", (e) => {
            if (!activeInput) return;
            let key = e.key;
            if (key === "Backspace") key = "DEL";
            
            if (key === "DEL" || key.startsWith("Arrow") || (key.length === 1 && key.match(/[a-z]/i))) {
                handleGridInput(key);
            }
        });

        // Initialize application picker cards on window launch
        initVolumeLauncher();
    </script>
</body>
</html>
